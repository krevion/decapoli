{% extends "base.html" %}
{% load static %}

{% block title %}{{ product.name }} | DECAPOLI{% endblock %}

{% block content %}
<section class="product-detail">
    <div class="product-detail-card">
        {% if product.image %}
        <img src="{{ product.image.url }}" alt="{{ product.name }}">
        {% endif %}
        <h1>{{ product.name }}</h1>
        <p class="price">KSh {{ product.price }}</p>
        <div class="product-desc">{{ product.description|linebreaksbr }}</div>
        <a class="btn-ghost" href="{% url 'wadiapp:home' %}">Back to products</a>
    </div>
</section>
{% endblock %}
